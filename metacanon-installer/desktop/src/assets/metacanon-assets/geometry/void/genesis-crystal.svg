<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Genesis Crystal — Core Node Indicator — Fractal Void -->
  <defs>
    <filter id="glow-gc" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Outer ring glow -->
  <circle cx="24" cy="24" r="20" stroke="#FFD700" stroke-width="1" opacity="0.2" filter="url(#glow-gc)"/>
  <circle cx="24" cy="24" r="14" stroke="#FFD700" stroke-width="1.5" opacity="0.5" filter="url(#glow-gc)"/>
  <!-- Inner diamond shape -->
  <polygon points="24,8 36,24 24,40 12,24" stroke="#FFD700" stroke-width="2" fill="#FFD700" fill-opacity="0.1" filter="url(#glow-gc)"/>
  <!-- Inner core -->
  <circle cx="24" cy="24" r="5" fill="#FFD700" filter="url(#glow-gc)"/>
  <!-- Cross-hair lines -->
  <line x1="24" y1="8"  x2="24" y2="40" stroke="#FFD700" stroke-width="0.75" opacity="0.35"/>
  <line x1="8"  y1="24" x2="40" y2="24" stroke="#FFD700" stroke-width="0.75" opacity="0.35"/>
</svg>
