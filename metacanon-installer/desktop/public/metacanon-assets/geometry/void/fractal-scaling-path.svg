<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none"><defs><filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter></defs>
    <!-- Background -->
    <rect width="900" height="320" fill="#05050A"/>
    <!-- Title -->
    <text x="450" y="28" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" letter-spacing="3" fill="#FFD700">METACANON AI — FRACTAL SCALING PATH</text>
    <text x="450" y="48" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#666677">Personal Tetrahedron  ·  Group Octahedron  ·  Network Icosahedron</text>

    <!-- Labels -->
    <text x="100" y="80" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#FFD700">PERSONAL NODE</text>
    <text x="100" y="96" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#666677">Tetrahedron · 4 Vertices</text>

    <text x="450" y="80" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#00F0FF">GROUP NODE</text>
    <text x="450" y="96" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#666677">Octahedron · 6 Vertices · ≤5 Personal Nodes</text>

    <text x="800" y="80" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="12" font-weight="600" fill="#BD00FF">NETWORK CLUSTER</text>
    <text x="800" y="96" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#666677">Icosahedron · 12 Vertices · Decentralized Mesh</text>

    
      <!-- Tetrahedron @ 50,110 -->
      <line x1="100" y1="110" x2="140" y2="190" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
      <line x1="60" y1="190" x2="140" y2="190" stroke="#FFD700" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>
      <line x1="100" y1="110" x2="60" y2="190" stroke="#FFD700" stroke-width="2" filter="url(#glow)"/>
      <line x1="100" y1="110" x2="100" y2="200" stroke="#00F0FF" stroke-width="2" filter="url(#glow)"/>
      <line x1="60" y1="190" x2="100" y2="200" stroke="#00F0FF" stroke-width="2"/>
      <line x1="140" y1="190" x2="100" y2="200" stroke="#BD00FF" stroke-width="2"/>
      <circle cx="100" cy="110"    r="5" fill="#FFD700" filter="url(#glow)"/>
      <circle cx="60" cy="190" r="4" fill="#00F0FF" filter="url(#glow)"/>
      <circle cx="140" cy="190" r="4" fill="#BD00FF"/>
      <circle cx="100" cy="200" r="4" fill="#FFD700" opacity="0.7"/>
    
    
      <line x1="155" y1="210" x2="287" y2="210" stroke="#666677" stroke-width="2"/>
      <polygon points="285,205 295,210 285,215" fill="#666677"/>
    
    
      <!-- Octahedron @ 300,110 -->
      <line x1="350" y1="110"    x2="315" y2="160" stroke="#00F0FF" stroke-width="1.5" filter="url(#glow)"/>
      <line x1="350" y1="110"    x2="385" y2="160" stroke="#00F0FF" stroke-width="1.5" filter="url(#glow)"/>
      <line x1="315" y1="160" x2="350" y2="170" stroke="#BD00FF" stroke-width="1.5"/>
      <line x1="385" y1="160" x2="350" y2="170" stroke="#BD00FF" stroke-width="1.5"/>
      <line x1="315" y1="160" x2="350" y2="210" stroke="#FFD700" stroke-width="1.5"/>
      <line x1="385" y1="160" x2="350" y2="210" stroke="#FFD700" stroke-width="1.5"/>
      <line x1="315" y1="160" x2="385" y2="160" stroke="#00F0FF" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
      <circle cx="350" cy="110"     r="5" fill="#00F0FF" filter="url(#glow)"/>
      <circle cx="315" cy="160"  r="4" fill="#BD00FF" filter="url(#glow)"/>
      <circle cx="385" cy="160"  r="4" fill="#BD00FF"/>
      <circle cx="350" cy="170"  r="4" fill="#FFD700"/>
      <circle cx="350" cy="210" r="4" fill="#FFD700" opacity="0.7"/>
    
    
      <line x1="410" y1="210" x2="542" y2="210" stroke="#666677" stroke-width="2"/>
      <polygon points="540,205 550,210 540,215" fill="#666677"/>
    
    
      <!-- Icosahedron @ 555,110 -->
      <polygon points="605,115 645,145 633,195 577,195 565,145"
               stroke="#BD00FF" stroke-width="1.5" fill="none" opacity="0.6" filter="url(#glow)"/>
      <polygon points="605,130 627,152 619,178 591,178 583,152"
               stroke="#00F0FF" stroke-width="1.5" fill="none" opacity="0.6"/>
      <line x1="605" y1="115"  x2="605" y2="130" stroke="#BD00FF" stroke-width="1"/>
      <line x1="645" y1="145" x2="627" y2="152" stroke="#BD00FF" stroke-width="1"/>
      <line x1="565" y1="145" x2="583" y2="152" stroke="#BD00FF" stroke-width="1"/>
      <line x1="633" y1="195" x2="619" y2="178" stroke="#00F0FF" stroke-width="1"/>
      <line x1="577" y1="195" x2="591" y2="178" stroke="#00F0FF" stroke-width="1"/>
      <line x1="605" y1="130" x2="605" y2="160" stroke="#FFD700" stroke-width="1" opacity="0.7"/>
      <line x1="627" y1="152" x2="605" y2="160" stroke="#FFD700" stroke-width="1" opacity="0.7"/>
      <line x1="583" y1="152" x2="605" y2="160" stroke="#FFD700" stroke-width="1" opacity="0.7"/>
      <circle cx="605" cy="115"  r="5" fill="#BD00FF" filter="url(#glow)"/>
      <circle cx="645" cy="145" r="4" fill="#00F0FF" filter="url(#glow)"/>
      <circle cx="565" cy="145" r="4" fill="#00F0FF"/>
      <circle cx="633" cy="195" r="4" fill="#FFD700"/>
      <circle cx="577" cy="195" r="4" fill="#FFD700"/>
      <circle cx="605" cy="160" r="5" fill="#BD00FF" filter="url(#glow)"/>
    

    <!-- Legend -->
    <circle cx="20"  cy="300" r="5" fill="#FFD700"/>
    <text x="30"  y="305" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#FFD700">Genesis Crystal / Apex Node</text>
    <circle cx="200" cy="300" r="5" fill="#00F0FF"/>
    <text x="210" y="305" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#00F0FF">Synthesis Agent / Checker A</text>
    <circle cx="400" cy="300" r="5" fill="#BD00FF"/>
    <text x="410" y="305" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#BD00FF">Auditor Agent / Cluster B</text>
    <circle cx="600" cy="300" r="5" fill="#666677"/>
    <text x="610" y="305" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#666677">EchoMesh Node</text>
    </svg>