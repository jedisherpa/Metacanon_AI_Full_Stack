<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Tetrahedron — Personal Node (4 vertices) — Fractal Light -->
  <!-- Back edges (dashed) -->
  <line x1="100" y1="30" x2="165" y2="145" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <line x1="35" y1="145" x2="165" y2="145" stroke="#D97706" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <!-- Front edges (solid) -->
  <line x1="100" y1="30" x2="35" y2="145" stroke="#D97706" stroke-width="2"/>
  <line x1="100" y1="30" x2="100" y2="155" stroke="#0891B2" stroke-width="2"/>
  <line x1="35" y1="145" x2="100" y2="155" stroke="#0891B2" stroke-width="2"/>
  <line x1="165" y1="145" x2="100" y2="155" stroke="#7C3AED" stroke-width="2"/>
  <!-- Vertices -->
  <circle cx="100" cy="30"  r="5" fill="#D97706"/>
  <circle cx="35"  cy="145" r="5" fill="#0891B2"/>
  <circle cx="165" cy="145" r="5" fill="#7C3AED"/>
  <circle cx="100" cy="155" r="5" fill="#D97706" opacity="0.7"/>
  <!-- Labels -->
  <text x="100" y="18"  text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#D97706">GENESIS</text>
  <text x="10"  y="152" text-anchor="start"  font-family="'IBM Plex Mono', monospace" font-size="9" fill="#0891B2">SYNTHESIS</text>
  <text x="170" y="152" text-anchor="start"  font-family="'IBM Plex Mono', monospace" font-size="9" fill="#7C3AED">AUDITOR</text>
  <text x="100" y="173" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#6B7280">MONITOR</text>
</svg>
